name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-native-emulator:
    name: Build native emulator
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build
        run: nix develop --command bash -lc 'cmake --preset native-debug && cmake --build --preset native-debug'
        working-directory: zenith-emulator

  build-native-assembler:
    name: Build and test native assembler
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build
        run: nix develop --command bash -lc 'cmake --preset native-debug && cmake --build --preset native-debug'
        working-directory: zenith-assembler

      - name: Test
        run: nix develop --command bash -lc 'ctest --test-dir build/native-debug --output-on-failure'
        working-directory: zenith-assembler

  build-native-compiler:
    name: Build and test native compiler
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build
        run: nix develop --command bash -lc 'cmake --preset native-debug && cmake --build --preset native-debug'
        working-directory: zenith-compiler

      - name: Test
        run: nix develop --command bash -lc 'ctest --test-dir build/native-debug --output-on-failure'
        working-directory: zenith-compiler

  build-wasm-emulator:
    name: Build wasm emulator
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build
        run: nix develop --command bash -lc 'emcmake cmake --preset wasm-debug && cmake --build --preset wasm-debug'
        working-directory: zenith-emulator

      - name: Upload wasm emulator
        uses: actions/upload-artifact@v4
        with:
          name: zenith-emulator-wasm
          path: |
            zenith-emulator/build/wasm-debug/zenith-emulator.js
            zenith-emulator/build/wasm-debug/zenith-emulator.wasm
            zenith-emulator/build/wasm-debug/zenith-emulator.d.ts
          if-no-files-found: error

  build-wasm-assembler:
    name: Build wasm assembler
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build
        run: nix develop --command bash -lc 'emcmake cmake --preset wasm-debug && cmake --build --preset wasm-debug'
        working-directory: zenith-assembler

      - name: Upload wasm assembler
        uses: actions/upload-artifact@v4
        with:
          name: zenith-assembler-wasm
          path: |
            zenith-assembler/build/wasm-debug/zenith-assembler.js
            zenith-assembler/build/wasm-debug/zenith-assembler.wasm
            zenith-assembler/build/wasm-debug/zenith-assembler.d.ts
          if-no-files-found: error

  build-wasm-compiler:
    name: Build wasm compiler
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build
        run: nix develop --command bash -lc 'emcmake cmake --preset wasm-debug && cmake --build --preset wasm-debug'
        working-directory: zenith-compiler

      - name: Upload wasm compiler
        uses: actions/upload-artifact@v4
        with:
          name: zenith-compiler-wasm
          path: |
            zenith-compiler/build/wasm-debug/zenith-compiler.js
            zenith-compiler/build/wasm-debug/zenith-compiler.wasm
            zenith-compiler/build/wasm-debug/zenith-compiler.d.ts
          if-no-files-found: error

  build-web:
    name: Build web
    runs-on: ubuntu-latest
    needs:
      - build-wasm-emulator
      - build-wasm-assembler
      - build-wasm-compiler
    permissions:
      contents: read
      pages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Download wasm emulator
        uses: actions/download-artifact@v4
        with:
          name: zenith-emulator-wasm
          path: zenith-web/src/wasm

      - name: Download wasm assembler
        uses: actions/download-artifact@v4
        with:
          name: zenith-assembler-wasm
          path: zenith-web/src/wasm

      - name: Download wasm compiler
        uses: actions/download-artifact@v4
        with:
          name: zenith-compiler-wasm
          path: zenith-web/src/wasm

      - name: Install dependencies
        run: nix develop --command bash -lc 'bun install --frozen-lockfile'
        working-directory: zenith-web

      - name: Generate RDL
        working-directory: zenith-web
        run: nix develop --command bash -lc 'peakrdl html ../zenith-hardware/rdl/keyboard_mmio.rdl -o public/rdl/keyboard_mmio/'

      - name: Build
        run: nix develop --command bash -lc 'bun run build'
        working-directory: zenith-web
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Configure Pages
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload web dist
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: zenith-web/dist

  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: build-web
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
